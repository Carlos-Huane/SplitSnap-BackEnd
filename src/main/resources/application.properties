# ── Servidor ──────────────────────────────────────────────────
server.port=8080

# ── Base de datos ────────────────────────────────────
# Usa MySQL si está disponible, si no H2 en memoria
spring.datasource.url=${DB_URL:jdbc:h2:mem:splitsnap_db}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── Swagger UI ────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ── Subida de archivos ────────────────────────────────────────
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:splitsnap_jwt_secret_key_2026_desarrollo}
jwt.expiration=${JWT_EXPIRATION:86400000}
