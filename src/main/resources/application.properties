# ── Servidor ──────────────────────────────────────────────────
# Railway asigna el puerto via la env var PORT. En local cae al 8080 si no está seteado.
server.port=${PORT:8080}
# Railway (y cualquier proxy reverso) termina TLS en su edge y pasa HTTP al container.
# Esta propiedad hace que Spring respete los headers X-Forwarded-* y construya las URLs
# absolutas con el protocolo original (https), evitando que Swagger UI genere URLs http
# que fallan por mixed content.
server.forward-headers-strategy=framework

# ── CORS ──────────────────────────────────────────────────────
# Lista de orígenes permitidos, separados por coma. En local vale localhost:5173.
# En Railway: setear CORS_ORIGINS=http://localhost:5173,https://splitsnap.vercel.app
app.cors.origins=${CORS_ORIGINS:http://localhost:5173}

# ── Base de datos MySQL ───────────────────────────────────────
# Las credenciales vienen del .env local o del panel de Railway en producción.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── Swagger UI ────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.theme=monokai

# ── Subida de archivos ────────────────────────────────────────
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ── JWT ───────────────────────────────────────────────────────
# En producción (Railway) se inyecta JWT_SECRET fuerte desde el panel.
# El fallback local solo sirve para desarrollo, no es seguro para producción.
jwt.secret=${JWT_SECRET:splitsnap_jwt_secret_key_2026_desarrollo}
jwt.expiration=86400000
